spring.application.name=fidness

# Puerto del servidor
server.port=80

# ==========================
# Base de Datos MySQL
# ==========================
spring.datasource.url=jdbc:mysql://localhost:3306/fidness?useTimezone=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=XXXX
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================
# Firebase Storage
# ==========================
firebase.bucket.name=fidness-XXXX.firebasestorage.app
firebase.storage.path=fidness
firebase.json.path=firebase
firebase.json.file=fidness-XXXXX-firebase-adminsdk-fbsvc-XXXXX.json

# ==========================
# Hibernate
# ==========================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================
# Thymeleaf
# ==========================
spring.thymeleaf.cache=false

# ==========================
# Multipart (Subida de archivos)
# ==========================
spring.servlet.multipart.max-file-size=16MB
spring.servlet.multipart.max-request-size=16MB
