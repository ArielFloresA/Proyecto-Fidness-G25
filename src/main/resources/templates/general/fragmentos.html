<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:fragment="head">

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <title>FIDNESS</title>

        <link rel="stylesheet"
              th:href="@{/css/bootstrap.min.css}"/>

        <style>

            body{
                background:#f5f7fa;
                font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
            }

            .navbar{
                background:linear-gradient(90deg,#0d6efd,#198754);
            }

            .navbar-brand{
                font-size:1.7rem;
                font-weight:bold;
                letter-spacing:1px;
            }

            .nav-link{
                color:white !important;
                font-weight:500;
                transition:.3s;
            }

            .nav-link:hover{
                color:#ffe082 !important;
            }

            .hero{
                background:linear-gradient(rgba(13,110,253,.85),
                    rgba(25,135,84,.80)),
                    url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=1600');
                background-size:cover;
                background-position:center;
                color:white;
                border-radius:20px;
                padding:80px 50px;
            }

            .hero h1{
                font-size:3rem;
                font-weight:bold;
            }

            .hero p{
                font-size:1.2rem;
            }

            .card{
                border:none;
                border-radius:18px;
            }

            .card:hover{
                transform:translateY(-5px);
                transition:.3s;
            }

            .titulo{
                color:#0d6efd;
                font-weight:bold;
            }

            footer{
                background:#212529;
                color:white;
                margin-top:60px;
            }

        </style>

    </head>

    <body>

        <header th:fragment="header">

            <nav class="navbar navbar-expand-lg navbar-dark shadow">

                <div class="container">

                    <a class="navbar-brand"
                       th:href="@{/}">

                        🏋 FIDNESS

                    </a>

                    <button class="navbar-toggler"
                            data-bs-toggle="collapse"
                            data-bs-target="#menu">

                        <span class="navbar-toggler-icon"></span>

                    </button>

                    <div class="collapse navbar-collapse"
                         id="menu">

                        <ul class="navbar-nav ms-auto">

                            <li class="nav-item">

                                <a class="nav-link"
                                   th:href="@{/}">

                                    Inicio

                                </a>

                            </li>

                            <li class="nav-item">

                                <a class="nav-link"
                                   th:href="@{/ejercicio/listado}">

                                    Ejercicios

                                </a>

                            </li>

                            <li class="nav-item">

                                <a class="nav-link"
                                   th:href="@{/rutina/listado}">

                                    Rutinas

                                </a>

                            </li>

                            <li class="nav-item">

                                <a class="nav-link"
                                   href="#">

                                    Mi Progreso

                                </a>

                            </li>

                            <li class="nav-item">

                                <a class="nav-link"
                                   href="#">

                                    Acerca de

                                </a>

                            </li>

                        </ul>

                        <div class="ms-3">

                            <a href="#"
                               class="btn btn-outline-light btn-sm">

                                Iniciar sesión

                            </a>

                            <a href="#"
                               class="btn btn-warning btn-sm">

                                Registrarse

                            </a>

                        </div>

                    </div>

                </div>

            </nav>

        </header>

        <footer th:fragment="footer">

            <div class="container py-4 text-center">

                <h5>

                    FIDNESS

                </h5>

                <p class="mb-1">

                    Desarrollo de Aplicaciones Web y Patrones

                </p>

                <small>

                    © 2026 Ariel Flores

                </small>

            </div>

            <script th:src="@{/js/bootstrap.bundle.min.js}"></script>

        </footer>

    </body>

</html>
